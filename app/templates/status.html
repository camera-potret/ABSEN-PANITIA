<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Absensi</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container" style="max-width: 400px; text-align: center; margin-top: 15vh;">
        {% if success %}
            <div style="font-size: 4rem; margin-bottom: 1rem;">✅</div>
            <h1 style="background: linear-gradient(to right, #10b981, #34d399); -webkit-background-clip: text;">Berhasil</h1>
        {% else %}
            <div style="font-size: 4rem; margin-bottom: 1rem;">❌</div>
            <h1 style="background: linear-gradient(to right, #ef4444, #f87171); -webkit-background-clip: text;">Gagal</h1>
        {% endif %}
        
        <p style="margin-bottom: 2rem; color: var(--text-muted);">{{ message }}</p>
        
        <a href="{{ url_for('absen_landing') }}" class="btn">Kembali ke Menu Utama</a>
    </div>
</body>
</html>
