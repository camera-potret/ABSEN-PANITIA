<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk Panitia</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container" style="max-width: 500px;">
        <a href="{{ url_for('absen_landing') }}" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">← Kembali</a>
        <h1 style="margin-top: 1rem;">Form Masuk</h1>
        
        <form method="POST">
            <div class="form-group">
                <label>Pilih Nama Anda</label>
                <select name="nama_id" required>
                    <option value="" disabled selected>-- Pilih Nama --</option>
                    {% for p in panitia %}
                        <option value="{{ p.id }}">{{ p.nama }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <p style="color: var(--text-muted); font-size: 0.8rem; margin-bottom: 1.5rem;">
                * Jika nama Anda tidak ada, berarti Anda sudah melakukan absen.
            </p>
            
            <button type="submit" class="btn">Submit Kehadiran</button>
        </form>

        <div class="author">
            <p>©2026 Made With IPNU IPPNU PAC Pucanglaban</p>
        </div>
    </div>
</body>
</html>
